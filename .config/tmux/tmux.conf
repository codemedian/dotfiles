# Cycle panes with C-b C-b
unbind ^B
bind ^B select-pane -t :.+

# Reload config with a key
unbind r
bind-key r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# prefix key key key repeat time
set -g repeat-time 250
set -sg escape-time 0
set -g focus-events on

# smart pane switching with awareness of vim splits
is_vim='echo "#{pane_current_command}" | grep -iqE "(^|\/)g?(view|n?vim?)(diff)?$"'
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -n C-\\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"


# Copy paste stuff
set-window-option -g mode-keys vi    # Use vim keybindings in copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
if-shell "command -v pbcopy >/dev/null 2>&1" \
  "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
  "bind-key -T copy-mode-vi y send-keys -X copy-selection"

# Use current pane directory for new splits and windows
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

##### A C T I V I T Y - T R A C K I N G  ########
set -g visual-bell off
set -g visual-activity off

setw -g bell-action any
setw -g monitor-bell on
setw -g monitor-activity on

######## D E S I G N - C H A N G E S ############

######################
### DESIGN CHANGES ###
######################

## Status bar
set -g status-position top
set -g status-justify centre
set -g status-interval 2
setw -g window-status-format " #I:#W " 

setw -g window-status-separator ""
setw -g window-status-activity-style fg=colour208,bold
setw -g window-status-bell-style fg=colour175,bold

# 1. Capture the current system appearance and set the appropriate style
if-shell '[[ $(defaults read -g AppleInterfaceStyle 2>/dev/null) == "Dark" ]]' \
    'source-file ~/.config/tmux/gruvbox-dark.conf' \
    'source-file ~/.config/tmux/gruvbox-light.conf'

# 1. PLUGIN SETTINGS (Must be before TPM)
set -g @dark-notify-theme-path-light '$HOME/.config/tmux/gruvbox-light.conf'
set -g @dark-notify-theme-path-dark '$HOME/.config/tmux/gruvbox-dark.conf'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'erikw/tmux-dark-notify'


run ~/.config/tmux/plugins/tpm/tpm
